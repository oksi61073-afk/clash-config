mixed-port: 7890
mode: rule
log-level: silent

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  nameserver:
    - 1.1.1.1
    - 8.8.8.8

proxy-providers:
  trafficindo:
    type: http
    url: https://raw.githubusercontent.com/oksi61073-afk/clash-config/main/trafficindom.yaml
    path: ./trafficindom.yaml
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 30

proxy-groups:
- name: AUTO
  type: url-test
  use:
    - trafficindo
  url: http://www.gstatic.com/generate_204
  interval: 20

- name: MANUAL
  type: select
  use:
    - trafficindo

rule-providers:
  basic:
    type: http
    behavior: domain
    url: https://raw.githubusercontent.com/oksi61073-afk/clash-config/main/rule_basic.yaml
    path: ./rule_basic.yaml
    interval: 3600

rules:
- RULE-SET,basic,AUTO
- MATCH,AUTO